<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证书同步管理系统</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f172a 0%, #1d4ed8 45%, #d97706 100%);
            --panel: rgba(255, 255, 255, 0.96);
            --text: #172033;
            --muted: #5f6b85;
            --line: #d8deea;
            --primary: #1d4ed8;
            --primary-dark: #163ea8;
            --success: #15803d;
            --danger: #b91c1c;
            --warning: #b45309;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 1160px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
            overflow: hidden;
        }

        .hero {
            padding: 28px 32px 18px;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.24), transparent 30%),
                linear-gradient(135deg, #0f172a, #1e3a8a 68%, #b45309);
            color: #fff;
        }

        .hero h1 {
            margin: 0;
            font-size: 2rem;
        }

        .hero p {
            margin: 10px 0 0;
            color: rgba(255, 255, 255, 0.85);
        }

        .content {
            padding: 28px 32px 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 20px;
            background: #fff;
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.1rem;
        }

        .muted {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-row.three {
            grid-template-columns: 1.2fr 0.7fr 1fr;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 0.92rem;
            font-weight: 700;
        }

        input,
        select,
        textarea,
        button {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            background: #f8fafc;
            color: var(--text);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid rgba(29, 78, 216, 0.18);
            border-color: var(--primary);
            background: #fff;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .primary-btn {
            background: var(--primary);
            color: #fff;
        }

        .primary-btn:hover {
            background: var(--primary-dark);
        }

        .secondary-btn {
            background: #e2e8f0;
            color: var(--text);
        }

        .success-btn {
            background: var(--success);
            color: #fff;
        }

        .danger-btn {
            background: var(--danger);
            color: #fff;
        }

        .warning-btn {
            background: var(--warning);
            color: #fff;
        }

        .radio-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-option {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 14px;
            background: #f8fafc;
        }

        .radio-option.active {
            border-color: rgba(29, 78, 216, 0.35);
            background: rgba(29, 78, 216, 0.06);
        }

        .radio-option input {
            width: auto;
            margin-right: 8px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .toolbar .field {
            min-width: 220px;
            flex: 1;
        }

        .stats {
            color: var(--muted);
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            background: #eff6ff;
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .table-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-block;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .chip.enabled {
            background: rgba(21, 128, 61, 0.12);
            color: var(--success);
        }

        .chip.disabled {
            background: rgba(185, 28, 28, 0.12);
            color: var(--danger);
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .log-container {
            margin-top: 20px;
            background: #0f172a;
            color: #dbeafe;
            border-radius: 18px;
            padding: 16px;
            max-height: 360px;
            overflow-y: auto;
            font-family: Consolas, "Courier New", monospace;
            display: none;
        }

        .log-container.active {
            display: block;
        }

        .log-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-line.warn {
            color: #fbbf24;
        }

        .log-line.error {
            color: #fca5a5;
        }

        .log-line.done {
            color: #86efac;
            font-weight: 700;
        }

        .message {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            display: none;
        }

        .message.visible {
            display: block;
        }

        .message.success {
            background: rgba(21, 128, 61, 0.12);
            color: var(--success);
        }

        .message.error {
            background: rgba(185, 28, 28, 0.12);
            color: var(--danger);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 920px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .form-row,
            .form-row.three {
                grid-template-columns: 1fr;
            }

            .content,
            .hero {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="hero">
            <h1>证书同步管理系统</h1>
            <p>服务器列表改为本地数据库管理，支持搜索、分页和逐条维护，避免整表加载变慢。</p>
        </div>

        <div class="content">
            <div class="grid">
                <div class="card">
                    <h2>执行同步</h2>
                    <form id="syncForm">
                        <div class="field">
                            <label for="domain">证书域名</label>
                            <div class="button-row">
                                <select id="domain" name="domain" required>
                                    <option value="">加载中...</option>
                                </select>
                                <button type="button" id="refreshDomains" class="secondary-btn">刷新域名</button>
                            </div>
                            <div class="muted">域名列表会并行读取证书过期时间，减少首页等待。</div>
                        </div>

                        <div class="field" style="margin-top: 18px;">
                            <label>目标模式</label>
                            <div class="radio-row">
                                <label class="radio-option active">
                                    <input type="radio" name="target_mode" value="all" checked>
                                    使用全部已启用服务器
                                </label>
                                <label class="radio-option">
                                    <input type="radio" name="target_mode" value="specific">
                                    临时指定服务器
                                </label>
                            </div>
                        </div>

                        <div id="specificTargets" class="hidden" style="margin-top: 18px;">
                            <div class="field">
                                <label for="specific_ips">临时服务器列表</label>
                                <textarea id="specific_ips" name="specific_ips"
                                    placeholder="每行一个，格式如 192.168.1.10:22 或 app.example.com:2222"></textarea>
                                <div class="muted">这里只用于本次同步，不会写入数据库。</div>
                            </div>
                        </div>

                        <div class="button-row" style="margin-top: 20px;">
                            <button type="submit" id="submitBtn" class="primary-btn">开始同步</button>
                        </div>
                    </form>

                    <div class="log-container" id="logContainer"></div>
                </div>

                <div class="card">
                    <h2 id="editorTitle">新增服务器</h2>
                    <form id="serverForm">
                        <input type="hidden" id="serverId">
                        <div class="form-row three">
                            <div class="field">
                                <label for="serverHost">主机/IP</label>
                                <input id="serverHost" type="text" placeholder="例如 192.168.1.100 或 app.example.com" required>
                            </div>
                            <div class="field">
                                <label for="serverPort">端口</label>
                                <input id="serverPort" type="number" min="1" max="65535" value="22" required>
                            </div>
                            <div class="field">
                                <label for="serverGroup">分组</label>
                                <input id="serverGroup" type="text" value="default" placeholder="例如 prod">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="field">
                                <label for="serverRemark">备注</label>
                                <input id="serverRemark" type="text" placeholder="例如 华南区网关">
                            </div>
                            <div class="field">
                                <label for="serverEnabled">状态</label>
                                <select id="serverEnabled">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                        </div>

                        <div class="button-row">
                            <button type="submit" class="success-btn" id="saveServerBtn">保存服务器</button>
                            <button type="button" class="secondary-btn" id="resetServerBtn">清空表单</button>
                        </div>
                    </form>

                    <div id="serverMessage" class="message"></div>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h2>全局服务器库</h2>
                <div class="toolbar">
                    <div class="field">
                        <label for="searchInput">搜索</label>
                        <input id="searchInput" type="text" placeholder="按主机、端口、分组、备注搜索">
                    </div>
                    <div class="field" style="max-width: 160px;">
                        <label for="pageSizeSelect">每页数量</label>
                        <select id="pageSizeSelect">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>

                <div class="button-row" style="margin-bottom: 12px;">
                    <button type="button" id="searchBtn" class="primary-btn">查询</button>
                    <button type="button" id="resetSearchBtn" class="secondary-btn">重置</button>
                    <div class="stats" id="serverStats"></div>
                </div>

                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>主机</th>
                                <th>端口</th>
                                <th>分组</th>
                                <th>备注</th>
                                <th>状态</th>
                                <th>更新时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="serverTableBody">
                            <tr>
                                <td colspan="7" class="muted">正在加载服务器列表...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <div id="paginationInfo" class="muted"></div>
                    <div class="button-row">
                        <button type="button" id="prevPageBtn" class="secondary-btn">上一页</button>
                        <button type="button" id="nextPageBtn" class="secondary-btn">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentMode: 'all',
            search: '',
            page: 1,
            pageSize: 20,
            pagination: { total: 0, pages: 0 },
            editingId: null
        };

        const domainSelect = document.getElementById('domain');
        const refreshDomainsBtn = document.getElementById('refreshDomains');
        const specificTargets = document.getElementById('specificTargets');
        const specificIps = document.getElementById('specific_ips');
        const radioOptions = document.querySelectorAll('.radio-option');
        const syncForm = document.getElementById('syncForm');
        const submitBtn = document.getElementById('submitBtn');
        const logContainer = document.getElementById('logContainer');

        const serverForm = document.getElementById('serverForm');
        const serverIdInput = document.getElementById('serverId');
        const serverHostInput = document.getElementById('serverHost');
        const serverPortInput = document.getElementById('serverPort');
        const serverGroupInput = document.getElementById('serverGroup');
        const serverRemarkInput = document.getElementById('serverRemark');
        const serverEnabledInput = document.getElementById('serverEnabled');
        const editorTitle = document.getElementById('editorTitle');
        const resetServerBtn = document.getElementById('resetServerBtn');
        const serverMessage = document.getElementById('serverMessage');

        const searchInput = document.getElementById('searchInput');
        const pageSizeSelect = document.getElementById('pageSizeSelect');
        const searchBtn = document.getElementById('searchBtn');
        const resetSearchBtn = document.getElementById('resetSearchBtn');
        const serverTableBody = document.getElementById('serverTableBody');
        const serverStats = document.getElementById('serverStats');
        const paginationInfo = document.getElementById('paginationInfo');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        let currentPageServers = [];

        function setMessage(text, type = 'success') {
            serverMessage.textContent = text;
            serverMessage.className = `message visible ${type}`;
        }

        function clearMessage() {
            serverMessage.textContent = '';
            serverMessage.className = 'message';
        }

        function resetServerForm() {
            state.editingId = null;
            serverIdInput.value = '';
            serverHostInput.value = '';
            serverPortInput.value = '22';
            serverGroupInput.value = 'default';
            serverRemarkInput.value = '';
            serverEnabledInput.value = 'true';
            editorTitle.textContent = '新增服务器';
        }

        function fillServerForm(server) {
            state.editingId = server.id;
            serverIdInput.value = server.id;
            serverHostInput.value = server.host;
            serverPortInput.value = server.port;
            serverGroupInput.value = server.group_name || 'default';
            serverRemarkInput.value = server.remark || '';
            serverEnabledInput.value = String(server.enabled);
            editorTitle.textContent = `编辑服务器 #${server.id}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadDomains() {
            domainSelect.innerHTML = '<option value="">加载中...</option>';
            try {
                const response = await fetch('/api/domains');
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '加载域名失败');
                }

                if (!data.domains.length) {
                    domainSelect.innerHTML = '<option value="">未找到可用证书</option>';
                    return;
                }

                const infoResults = await Promise.all(
                    data.domains.map(async (domain) => {
                        try {
                            const certRes = await fetch(`/api/cert_info/${encodeURIComponent(domain)}`);
                            const certData = await certRes.json();
                            return { domain, certData };
                        } catch (error) {
                            return { domain, certData: null };
                        }
                    })
                );

                domainSelect.innerHTML = '<option value="">请选择证书域名</option>';
                infoResults.forEach(({ domain, certData }) => {
                    const option = document.createElement('option');
                    option.value = domain;

                    if (certData && certData.success) {
                        const prefix = certData.days_left < 30 ? '即将到期' : '有效';
                        option.textContent = `${domain} (${prefix}，剩余 ${certData.days_left} 天)`;
                    } else {
                        option.textContent = domain;
                    }

                    domainSelect.appendChild(option);
                });
            } catch (error) {
                domainSelect.innerHTML = '<option value="">加载失败</option>';
                addLog(`域名加载失败: ${error.message}`, 'error');
            }
        }

        async function loadServers() {
            serverTableBody.innerHTML = '<tr><td colspan="7" class="muted">正在加载服务器列表...</td></tr>';
            try {
                const params = new URLSearchParams({
                    page: state.page,
                    page_size: state.pageSize,
                    search: state.search
                });
                const response = await fetch(`/api/servers?${params.toString()}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '加载服务器失败');
                }

                renderServers(data.items);
                state.pagination = data.pagination;

                const total = data.pagination.total;
                serverStats.textContent = `共 ${total} 台服务器`;
                paginationInfo.textContent = total
                    ? `第 ${data.pagination.page} / ${data.pagination.pages} 页`
                    : '暂无服务器';

                prevPageBtn.disabled = state.page <= 1;
                nextPageBtn.disabled = !data.pagination.pages || state.page >= data.pagination.pages;
            } catch (error) {
                serverTableBody.innerHTML = `<tr><td colspan="7" class="muted">加载失败: ${error.message}</td></tr>`;
                serverStats.textContent = '';
                paginationInfo.textContent = '';
            }
        }

        function renderServers(servers) {
            currentPageServers = servers;

            if (!servers.length) {
                serverTableBody.innerHTML = '<tr><td colspan="7" class="muted">没有匹配的服务器记录</td></tr>';
                return;
            }

            serverTableBody.innerHTML = servers.map((server) => `
                <tr>
                    <td>${server.host}</td>
                    <td>${server.port}</td>
                    <td>${server.group_name || 'default'}</td>
                    <td>${server.remark || '-'}</td>
                    <td><span class="chip ${server.enabled ? 'enabled' : 'disabled'}">${server.enabled ? '启用' : '禁用'}</span></td>
                    <td>${server.updated_at || '-'}</td>
                    <td>
                        <div class="table-actions">
                            <button type="button" class="secondary-btn" onclick="editServerById(${server.id})">编辑</button>
                            <button type="button" class="danger-btn" onclick="removeServer(${server.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.editServerById = function (serverId) {
            const server = currentPageServers.find((item) => item.id === serverId);
            if (!server) {
                setMessage('未找到要编辑的服务器记录', 'error');
                return;
            }
            fillServerForm(server);
            clearMessage();
        };

        window.removeServer = async function (serverId) {
            if (!window.confirm('确认删除这台服务器吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/servers/${serverId}`, { method: 'DELETE' });
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || '删除失败');
                }

                if (state.editingId === serverId) {
                    resetServerForm();
                }

                setMessage('服务器已删除');

                if (state.page > 1 && serverTableBody.querySelectorAll('tr').length === 1) {
                    state.page -= 1;
                }

                await loadServers();
            } catch (error) {
                setMessage(error.message, 'error');
            }
        };

        async function saveServer(event) {
            event.preventDefault();
            clearMessage();

            const payload = {
                host: serverHostInput.value.trim(),
                port: Number(serverPortInput.value),
                group_name: serverGroupInput.value.trim(),
                remark: serverRemarkInput.value.trim(),
                enabled: serverEnabledInput.value === 'true'
            };

            const isEdit = Boolean(state.editingId);
            const url = isEdit ? `/api/servers/${state.editingId}` : '/api/servers';
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || '保存失败');
                }

                setMessage(isEdit ? '服务器已更新' : '服务器已创建');
                resetServerForm();
                await loadServers();
            } catch (error) {
                setMessage(error.message, 'error');
            }
        }

        function updateTargetMode(mode) {
            state.currentMode = mode;
            specificTargets.classList.toggle('hidden', mode !== 'specific');

            radioOptions.forEach((option) => {
                const radio = option.querySelector('input');
                option.classList.toggle('active', radio.value === mode);
            });
        }

        async function submitSync(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append('domain', domainSelect.value);
            formData.append('target_mode', state.currentMode);

            if (state.currentMode === 'specific') {
                const value = specificIps.value.trim();
                if (!value) {
                    addLog('请先填写临时服务器列表', 'error');
                    return;
                }
                formData.append('specific_ips', value);
            }

            logContainer.innerHTML = '';
            logContainer.classList.add('active');
            submitBtn.disabled = true;
            submitBtn.textContent = '同步中...';

            try {
                const response = await fetch('/sync', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    addLog(await response.text(), 'error');
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach((line) => {
                        if (!line.startsWith('data: ')) {
                            return;
                        }

                        const message = line.slice(6);
                        if (message === '[KEEPALIVE]' || message === '[DONE]') {
                            return;
                        }
                        if (message.startsWith('[SUCCESS]')) {
                            addLog('全部服务器同步完成', 'done');
                            return;
                        }
                        if (message.startsWith('[FAILED]')) {
                            addLog(`同步失败: ${message.replace('[FAILED]', '').trim() || '存在失败节点'}`, 'error');
                            return;
                        }
                        addLog(message, inferLogType(message));
                    });
                }
            } catch (error) {
                addLog(`连接错误: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '开始同步';
            }
        }

        function inferLogType(message) {
            if (message.includes('[ERROR]')) {
                return 'error';
            }
            if (message.includes('[WARN]')) {
                return 'warn';
            }
            return 'info';
        }

        function addLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.textContent = message;
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        searchBtn.addEventListener('click', async () => {
            state.search = searchInput.value.trim();
            state.page = 1;
            await loadServers();
        });

        resetSearchBtn.addEventListener('click', async () => {
            searchInput.value = '';
            state.search = '';
            state.page = 1;
            await loadServers();
        });

        pageSizeSelect.addEventListener('change', async () => {
            state.pageSize = Number(pageSizeSelect.value);
            state.page = 1;
            await loadServers();
        });

        prevPageBtn.addEventListener('click', async () => {
            if (state.page > 1) {
                state.page -= 1;
                await loadServers();
            }
        });

        nextPageBtn.addEventListener('click', async () => {
            if (state.pagination.pages && state.page < state.pagination.pages) {
                state.page += 1;
                await loadServers();
            }
        });

        document.querySelectorAll('input[name="target_mode"]').forEach((radio) => {
            radio.addEventListener('change', (event) => updateTargetMode(event.target.value));
        });

        refreshDomainsBtn.addEventListener('click', loadDomains);
        serverForm.addEventListener('submit', saveServer);
        resetServerBtn.addEventListener('click', () => {
            resetServerForm();
            clearMessage();
        });
        syncForm.addEventListener('submit', submitSync);

        resetServerForm();
        updateTargetMode('all');
        loadDomains();
        loadServers();
    </script>
</body>

</html>
