<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>登录 - 证书同步管理</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f5f5f7;
            --bg-soft: #fbfbfd;
            --bg-accent-a: rgba(0, 113, 227, 0.12);
            --bg-accent-b: rgba(255, 159, 10, 0.10);
            --text: #1d1d1f;
            --muted: #6e6e73;
            --heading: #111113;
            --line: rgba(29, 29, 31, 0.08);
            --panel: rgba(255, 255, 255, 0.76);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --danger: #d93025;
            --danger-soft: rgba(217, 48, 37, 0.12);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0b0f;
                --bg-soft: #15161b;
                --bg-accent-a: rgba(41, 151, 255, 0.16);
                --bg-accent-b: rgba(110, 84, 255, 0.12);
                --text: #f5f7fb;
                --muted: #bcc3cf;
                --heading: #ffffff;
                --line: rgba(255, 255, 255, 0.1);
                --panel: rgba(24, 24, 28, 0.78);
                --panel-strong: rgba(32, 33, 38, 0.94);
                --primary: #2997ff;
                --primary-hover: #45a4ff;
                --danger: #ff6961;
                --danger-soft: rgba(255, 105, 97, 0.14);
                --shadow: 0 28px 80px rgba(0, 0, 0, 0.46);
            }
        }

        :root[data-force-theme="light"] {
            --bg: #f5f5f7;
            --bg-soft: #fbfbfd;
            --bg-accent-a: rgba(0, 113, 227, 0.12);
            --bg-accent-b: rgba(255, 159, 10, 0.10);
            --text: #1d1d1f;
            --muted: #6e6e73;
            --heading: #111113;
            --line: rgba(29, 29, 31, 0.08);
            --panel: rgba(255, 255, 255, 0.76);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --danger: #d93025;
            --danger-soft: rgba(217, 48, 37, 0.12);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        :root[data-force-theme="dark"] {
            --bg: #0b0b0f;
            --bg-soft: #15161b;
            --bg-accent-a: rgba(41, 151, 255, 0.16);
            --bg-accent-b: rgba(110, 84, 255, 0.12);
            --text: #f5f7fb;
            --muted: #bcc3cf;
            --heading: #ffffff;
            --line: rgba(255, 255, 255, 0.1);
            --panel: rgba(24, 24, 28, 0.78);
            --panel-strong: rgba(32, 33, 38, 0.94);
            --primary: #2997ff;
            --primary-hover: #45a4ff;
            --danger: #ff6961;
            --danger-soft: rgba(255, 105, 97, 0.14);
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.46);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, var(--bg-accent-a), transparent 30%),
                radial-gradient(circle at bottom right, var(--bg-accent-b), transparent 24%),
                linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
        }

        .shell {
            width: 100%;
            max-width: 980px;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 16px;
            align-items: stretch;
        }

        .hero,
        .panel {
            border-radius: 32px;
            border: 1px solid var(--line);
            backdrop-filter: blur(26px);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 28px 26px;
            background:
                radial-gradient(circle at top right, rgba(0, 113, 227, 0.16), transparent 28%),
                linear-gradient(180deg, var(--panel-strong), var(--panel));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(0, 113, 227, 0.10);
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .hero h1 {
            margin: 18px 0 10px;
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: 1.04;
            letter-spacing: -0.04em;
            color: var(--heading);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 30rem;
        }

        .hero-list {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .hero-item {
            padding: 14px 16px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.34);
            border: 1px solid var(--line);
        }

        @media (prefers-color-scheme: dark) {
            .hero-item {
                background: rgba(255, 255, 255, 0.03);
            }
        }

        .hero-item strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.98rem;
        }

        .hero-item span {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .hero-actions {
            margin-top: 18px;
        }

        .theme-select {
            min-width: 180px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            font: inherit;
        }

        @media (prefers-color-scheme: dark) {
            .theme-select {
                background: rgba(255, 255, 255, 0.04);
            }
        }

        .panel {
            background: var(--panel);
            padding: 28px 24px;
        }

        .panel h2 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--heading);
        }

        .panel-copy {
            margin: 10px 0 18px;
            color: var(--muted);
            line-height: 1.65;
            font-size: 0.95rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--heading);
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            input {
                background: rgba(255, 255, 255, 0.04);
            }
        }

        input:focus {
            outline: none;
            border-color: rgba(0, 113, 227, 0.42);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
            background: var(--panel-strong);
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            margin-top: 10px;
            background: var(--primary);
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 113, 227, 0.22);
            transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .error-message {
            margin-bottom: 18px;
            padding: 13px 14px;
            border-radius: 18px;
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(217, 48, 37, 0.14);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .footnote {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.55;
        }

        @media (max-width: 860px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel {
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <div>
                <span class="eyebrow">Certificate Sync Console</span>
                <h1>登录后，继续把证书分发这件事做得更简单。</h1>
                <p>系统会自动跟随你的设备深浅色设置，并保持和主控制台一致的视觉风格与操作节奏。</p>
                <div class="hero-actions">
                    <select id="themeSelect" class="theme-select" aria-label="主题模式">
                        <option value="system">跟随系统</option>
                        <option value="light">浅色</option>
                        <option value="dark">深色</option>
                    </select>
                </div>
            </div>

            <div class="hero-list">
                <div class="hero-item">
                    <strong>更轻的管理视图</strong>
                    <span>服务器库已经切到本地数据库，适合持续维护和快速检索。</span>
                </div>
                <div class="hero-item">
                    <strong>更清楚的执行状态</strong>
                    <span>单机同步和整批同步都能直接看到任务过程、成功与失败结果。</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>系统登录</h2>
            <p class="panel-copy">输入账号和密码，进入证书同步管理台。</p>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="field">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">登录</button>
            </form>

            <div class="footnote">界面会自动适配浅色、深色和系统主题，无需单独切换。</div>
        </section>
    </div>
    <script>
        function applyTheme(theme) {
            const root = document.documentElement;
            root.style.colorScheme = theme === 'system' ? 'light dark' : theme;
            root.dataset.theme = theme;

            if (theme === 'system') {
                delete root.dataset.forceTheme;
            } else {
                root.dataset.forceTheme = theme;
            }
        }

        const themeSelect = document.getElementById('themeSelect');
        const savedTheme = localStorage.getItem('theme-preference') || 'system';
        themeSelect.value = savedTheme;
        applyTheme(savedTheme);

        themeSelect.addEventListener('change', (event) => {
            const theme = event.target.value;
            localStorage.setItem('theme-preference', theme);
            applyTheme(theme);
        });
    </script>
</body>
</html>
