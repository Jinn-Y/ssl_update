version: '3.8'

services:
  cert-sync:
    build: .
    container_name: cert-sync-web
    ports:
      - "5000:5000"
    volumes:
      # 挂载 SSH 密钥，用于连接远端服务器
      - ~/.ssh:/root/.ssh:ro
      # 挂载 ACME 证书目录
      - /root/.acme.sh:/root/.acme.sh:ro
      # 挂载旧版服务器列表文件（兼容导入）
      - /export0/shell/scp_cert/servers.txt:/app/servers.txt
      # 挂载环境配置文件
      - ./.env:/app/.env:ro
      # 使用 Docker 命名卷持久化 SQLite 数据库，避免重新 clone 代码目录后数据丢失
      - cert-sync-data:/app/data
    environment:
      - DRY_RUN=False
      - SERVER_LIST_PATH=/app/servers.txt
      - SERVER_DB_PATH=/app/data/servers.db
    restart: unless-stopped
    networks:
      - cert-sync-network

networks:
  cert-sync-network:
    driver: bridge

volumes:
  cert-sync-data:
    name: cert-sync-data
